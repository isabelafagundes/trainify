<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trainify — Mapa muscular</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Figtree:wght@400;500;600;700&display=swap');
    :root { --ink:#27231f; --muted:#756e66; --paper:#f8f5ef; --card:#fffdf9; --line:#e4ddd3; --soft:#eee9e1; --amber:#d97728; --amber-dark:#9e4619; --amber-soft:#f5c9a8; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--ink); font-family:Figtree,system-ui,sans-serif; background:radial-gradient(circle at 18% 0%,#efded1 0,transparent 33%),radial-gradient(circle at 85% 90%,#ead6c8 0,transparent 30%),var(--paper); }
    .shell { width:min(1060px,100%); margin:auto; padding:36px 22px 48px; }
    header { display:flex; align-items:end; justify-content:space-between; gap:24px; margin-bottom:24px; }
    .eyebrow { margin:0 0 8px; color:var(--amber-dark); font-size:12px; font-weight:700; letter-spacing:.13em; text-transform:uppercase; }
    h1 { margin:0; font:700 clamp(28px,4vw,42px)/1.05 'Bricolage Grotesque',sans-serif; letter-spacing:-.035em; }
    .subtitle { max-width:530px; margin:10px 0 0; color:var(--muted); }
    .exercise-picker { min-width:245px; }
    label { display:block; margin-bottom:6px; color:var(--muted); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
    select { width:100%; padding:12px 38px 12px 14px; border:1px solid var(--line); border-radius:12px; color:var(--ink); background:var(--card); font:600 15px Figtree; }
    .layout { display:grid; grid-template-columns:minmax(0,1.4fr) minmax(280px,.8fr); gap:18px; }
    .card { border:1px solid rgba(107,89,71,.16); border-radius:22px; background:rgba(255,253,249,.88); box-shadow:0 16px 44px rgba(76,54,37,.08); backdrop-filter:blur(12px); }
    .figure-card { padding:20px 22px 12px; }
    .card-top { display:flex; align-items:center; justify-content:space-between; }
    .card-top h2, .details h2 { margin:0; font:700 20px 'Bricolage Grotesque'; }
    .view-toggle { display:flex; gap:4px; padding:4px; border-radius:11px; background:var(--soft); }
    .view-toggle button { border:0; border-radius:8px; padding:7px 12px; color:var(--muted); background:transparent; font:600 13px Figtree; cursor:pointer; }
    .view-toggle button.active { color:var(--ink); background:var(--card); box-shadow:0 2px 8px #6d59421c; }
    .stage { display:grid; place-items:center; min-height:500px; overflow:hidden; }
    svg { width:285px; height:480px; overflow:visible; filter:drop-shadow(0 15px 18px rgba(57,44,33,.08)); }
    .body { fill:#e5dfd6; stroke:#c9c0b4; stroke-width:1.5; }
    .body-detail { fill:none; stroke:#c6bdb1; stroke-width:1.15; stroke-linecap:round; opacity:.8; }
    .muscle { fill:transparent; stroke:transparent; stroke-width:1; transition:fill .35s ease,stroke .35s ease,opacity .35s ease; cursor:help; }
    .muscle.primary { fill:var(--amber); stroke:var(--amber-dark); }
    .muscle.secondary { fill:var(--amber-soft); stroke:#dc9561; }
    .muscle:hover { filter:brightness(.94); }
    .details { padding:24px; display:flex; flex-direction:column; }
    .exercise-name { margin:5px 0 20px; font:700 28px/1.08 'Bricolage Grotesque'; letter-spacing:-.025em; }
    .legend { display:flex; gap:16px; padding-bottom:20px; border-bottom:1px solid var(--line); color:var(--muted); font-size:13px; }
    .key { display:flex; align-items:center; gap:7px; }
    .dot { width:10px; height:10px; border-radius:50%; background:var(--amber); }.dot.secondary { background:var(--amber-soft); border:1px solid #dc9561; }
    .group { padding:20px 0; border-bottom:1px solid var(--line); }
    .group:last-of-type { border:0; }
    .group-title { margin:0 0 11px; color:var(--muted); font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
    .muscle-row { display:flex; justify-content:space-between; align-items:center; margin:9px 0; font-weight:600; }
    .badge { padding:4px 8px; border-radius:999px; color:var(--amber-dark); background:#f9e2d0; font-size:11px; font-weight:700; }
    .tip { margin-top:auto; padding:14px; border-radius:13px; color:#655b51; background:#f1ece4; font-size:13px; line-height:1.45; }
    .tip strong { color:var(--ink); }
    @media(max-width:760px){ .shell{padding:24px 14px 30px} header{align-items:stretch;flex-direction:column}.exercise-picker{width:100%}.layout{grid-template-columns:1fr}.stage{min-height:440px}svg{height:420px}.details{min-height:390px} }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div><p class="eyebrow">Anatomia do exercício</p><h1>Onde você deve sentir?</h1><p class="subtitle">Visualize os músculos recrutados e entenda o papel de cada grupo durante o movimento.</p></div>
      <div class="exercise-picker"><label for="exercise">Exercício</label><select id="exercise"><option value="bench">Supino reto</option><option value="squat">Agachamento livre</option><option value="row">Remada curvada</option><option value="curl">Rosca direta</option></select></div>
    </header>
    <section class="layout">
      <article class="card figure-card">
        <div class="card-top"><h2>Mapa muscular</h2><div class="view-toggle"><button class="active" data-view="front">Frente</button><button data-view="back">Costas</button></div></div>
        <div class="stage" aria-live="polite">
          <svg viewBox="0 0 260 470" role="img" aria-label="Figura humana com músculos destacados">
            <g id="front">
              <ellipse class="body" cx="130" cy="36" rx="25" ry="30"/><path class="body" d="M104 69 Q79 76 70 107 L52 190 Q49 203 58 206 Q68 208 72 196 L91 128 L96 226 L84 337 L93 445 Q94 458 105 458 Q116 457 116 443 L119 350 L130 259 L141 350 L144 443 Q144 457 155 458 Q166 458 167 445 L176 337 L164 226 L169 128 L188 196 Q192 208 202 206 Q211 203 208 190 L190 107 Q181 76 156 69 Q130 78 104 69Z"/>
              <path class="body-detail" d="M130 78V245M99 112Q130 126 161 112M97 164Q130 174 163 164M115 256L130 273L145 256M96 350h21M143 350h21"/>
              <path class="muscle" data-muscle="peitoral" d="M103 94 Q115 81 128 89 L127 127 Q109 132 96 115Z M157 94 Q145 81 132 89 L133 127 Q151 132 164 115Z"/>
              <path class="muscle" data-muscle="ombros" d="M102 83Q84 87 78 105Q88 111 98 113L109 89Z M158 83Q176 87 182 105Q172 111 162 113L151 89Z"/>
              <path class="muscle" data-muscle="biceps" d="M83 116Q73 135 70 158L84 162Q93 140 94 119Z M177 116Q187 135 190 158L176 162Q167 140 166 119Z"/>
              <path class="muscle" data-muscle="abdomen" d="M112 134Q130 141 148 134L146 211Q130 222 114 211Z"/>
              <path class="muscle" data-muscle="quadriceps" d="M99 253Q89 292 90 335L115 337L125 269Z M161 253Q171 292 170 335L145 337L135 269Z"/>
              <path class="muscle" data-muscle="panturrilhas" d="M91 349Q86 390 94 426L113 424L113 353Z M169 349Q174 390 166 426L147 424L147 353Z"/>
            </g>
            <g id="back" style="display:none">
              <ellipse class="body" cx="130" cy="36" rx="25" ry="30"/><path class="body" d="M104 69 Q79 76 70 107 L52 190 Q49 203 58 206 Q68 208 72 196 L91 128 L96 226 L84 337 L93 445 Q94 458 105 458 Q116 457 116 443 L119 350 L130 259 L141 350 L144 443 Q144 457 155 458 Q166 458 167 445 L176 337 L164 226 L169 128 L188 196 Q192 208 202 206 Q211 203 208 190 L190 107 Q181 76 156 69 Q130 78 104 69Z"/>
              <path class="body-detail" d="M110 71Q130 83 150 71M130 80V230M98 219Q130 235 162 219M96 350h21M143 350h21"/>
              <path class="muscle" data-muscle="ombros" d="M102 83Q84 87 78 105Q88 111 98 113L109 89Z M158 83Q176 87 182 105Q172 111 162 113L151 89Z"/>
              <path class="muscle" data-muscle="costas" d="M108 84Q130 102 152 84L164 126L150 193L130 211L110 193L96 126Z"/>
              <path class="muscle" data-muscle="triceps" d="M82 115Q72 139 70 164L84 161Q92 139 94 118Z M178 115Q188 139 190 164L176 161Q168 139 166 118Z"/>
              <path class="muscle" data-muscle="gluteos" d="M99 218Q130 207 130 244Q124 269 98 260Z M161 218Q130 207 130 244Q136 269 162 260Z"/>
              <path class="muscle" data-muscle="posteriores" d="M98 265Q88 302 90 338L116 338L126 270Z M162 265Q172 302 170 338L144 338L134 270Z"/>
              <path class="muscle" data-muscle="panturrilhas" d="M91 349Q86 390 94 426L113 424L113 353Z M169 349Q174 390 166 426L147 424L147 353Z"/>
            </g>
          </svg>
        </div>
      </article>
      <aside class="card details"><p class="eyebrow">Exercício selecionado</p><h2 class="exercise-name" id="exercise-name">Supino reto</h2><div class="legend"><span class="key"><i class="dot"></i>Ativação primária</span><span class="key"><i class="dot secondary"></i>Secundária</span></div><div id="muscle-list"></div><p class="tip"><strong>Dica:</strong> <span id="tip-text"></span></p></aside>
    </section>
  </main>
  <script>
    const exercises = {
      bench:{name:'Supino reto',view:'front',primary:['peitoral'],secondary:['ombros','triceps'],tip:'mantenha as escápulas encaixadas e leve a barra em direção à linha média do peito.'},
      squat:{name:'Agachamento livre',view:'front',primary:['quadriceps','gluteos'],secondary:['abdomen','posteriores'],tip:'empurre o chão com os pés e mantenha o tronco firme durante toda a subida.'},
      row:{name:'Remada curvada',view:'back',primary:['costas'],secondary:['biceps','ombros'],tip:'inicie puxando as escápulas para trás e evite transformar o movimento em uma rosca.'},
      curl:{name:'Rosca direta',view:'front',primary:['biceps'],secondary:['abdomen'],tip:'mantenha os cotovelos próximos ao corpo e controle a descida sem embalo.'}
    };
    const labels={peitoral:'Peitoral maior',ombros:'Deltoide anterior',triceps:'Tríceps braquial',quadriceps:'Quadríceps',gluteos:'Glúteos',abdomen:'Core / abdômen',posteriores:'Posteriores da coxa',costas:'Dorsal e trapézio',biceps:'Bíceps braquial',panturrilhas:'Panturrilhas'};
    const select=document.querySelector('#exercise'), buttons=[...document.querySelectorAll('[data-view]')];
    function setView(view){ document.querySelector('#front').style.display=view==='front'?'block':'none'; document.querySelector('#back').style.display=view==='back'?'block':'none'; buttons.forEach(b=>b.classList.toggle('active',b.dataset.view===view)); }
    function render(){ const ex=exercises[select.value]; document.querySelector('#exercise-name').textContent=ex.name; document.querySelector('#tip-text').textContent=ex.tip; document.querySelectorAll('.muscle').forEach(m=>{m.classList.remove('primary','secondary');const key=m.dataset.muscle;if(ex.primary.includes(key))m.classList.add('primary');if(ex.secondary.includes(key))m.classList.add('secondary');}); document.querySelector('#muscle-list').innerHTML=`<div class="group"><p class="group-title">Principais</p>${ex.primary.map(x=>`<div class="muscle-row"><span>${labels[x]}</span><span class="badge">PRIMÁRIO</span></div>`).join('')}</div><div class="group"><p class="group-title">Também recrutados</p>${ex.secondary.map(x=>`<div class="muscle-row"><span>${labels[x]}</span><span class="badge">APOIO</span></div>`).join('')}</div>`; setView(ex.view); }
    select.addEventListener('change',render); buttons.forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view))); render();
  </script>
</body>
</html>
